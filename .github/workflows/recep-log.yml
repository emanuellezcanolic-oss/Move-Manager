name: Registro de avance Recepcion

on:
  schedule:
    # Cada ~5 dias (dias 1,6,11,16,21,26,31) a las 09:00 ART (12:00 UTC)
    - cron: '0 12 */5 * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: recep-log
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar registro de avance
        run: python scripts/recep_snapshot.py

      - name: Commit si hay cambios
        run: |
          git config user.name "move-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain analisis/recep-log.json)" ]; then
            git add analisis/recep-log.json
            git commit -m "chore(recep): registro automatico de avance [skip ci]"
            git push
          else
            echo "Sin cambios en el registro."
          fi
